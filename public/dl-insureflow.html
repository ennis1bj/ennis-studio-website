<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Complete — InsureFlow | Ennis Studio</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="2;url=pdf/insureflow-instructions.pdf">
  <script>setTimeout(function(){window.location.href='pdf/insureflow-instructions.pdf'},1500);</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070f;
      color: #f0f0f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .brand {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6b78;
      margin-bottom: 2.5rem;
    }
    .check {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(67, 122, 34, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
    }
    .check svg {
      width: 28px;
      height: 28px;
      color: #5cb832;
    }
    h1 {
      font-size: 1.625rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.625rem;
      color: #ffffff;
    }
    .product-name {
      font-size: 1rem;
      font-weight: 500;
      color: #9d9dab;
      margin-bottom: 1.25rem;
    }
    .description {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #8a8a99;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8125rem 1.75rem;
      background: #ffffff;
      color: #07070f;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .btn:hover { background: #e8e8ec; }
    .btn:active { transform: scale(0.98); }
    .btn svg {
      width: 18px;
      height: 18px;
    }
    .fallback {
      font-size: 0.8125rem;
      color: #5a5a68;
      margin-top: 1.25rem;
      line-height: 1.5;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #3e3e4a;
    }
    .footer a {
      color: #5a5a68;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      h1 { font-size: 1.375rem; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Ennis Studio</div>

    <div class="check">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>

    <h1>Thanks for your purchase</h1>
    <p class="product-name">InsureFlow</p>
    <p class="description">Your template instructions are ready. The PDF contains your setup steps and Notion template link.</p>

    <a href="pdf/insureflow-instructions.pdf" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
      </svg>
      Open Instructions PDF
    </a>

    <p class="fallback">If the PDF doesn't open, click the button above.</p>

    <div class="footer">
      <a href="https://www.ennis-studio.com">ennis-studio.com</a>
    </div>
  </div>
</body>
</html>
